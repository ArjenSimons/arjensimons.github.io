<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Player Stats · Knoller Clash</title>
  <link rel="stylesheet" href="css/clash.css">
</head>
<body>
  <main class="shell">
    <nav class="topbar">
      <a class="brand" href="./">KNOLLER CLASH RESULTS</a>
      <div class="nav">
        <a href="./">Home</a>
        <a href="players.html">Player stats</a>
        <a href="champions.html">Champion stats</a>
        <a href="stats.html">Fun stats</a>
        <a href="admin.html">Add tournament</a>
      </div>
    </nav>
    <header class="page-heading">
      <h1>Player stats</h1>
    </header>
    <section class="ranking-controls">
      <label for="player-sort">Sort by
        <select id="player-sort">
          <option value="score">Average score</option><option value="games">Games</option><option value="winrate">Win rate</option>
          <option value="kda">Average KDA</option><option value="kp">Kill participation</option>
          <option value="vision">Vision score</option><option value="damage">Damage</option>
          <option value="mvps">MVPs</option><option value="ints">INTs</option><option value="name">Player name</option>
        </select>
      </label>
    </section>
    <section id="player-rankings"></section>
  </main>
  <script type="module" src="js/players.js"></script>
</body>
</html>
